<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F7F4EF">
<meta name="format-detection" content="telephone=no">
<title>Vokabel-Trainer</title>
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface2: #EDE9E1;
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #9A958E;
    --accent: #2D5A3D;
    --accent-light: #E8F0EB;
    --red: #8B2E2E;
    --red-light: #F5E8E8;
    --border: rgba(0,0,0,0.09);
    --shadow: 0 10px 30px rgba(26,24,20,0.08);
    --radius: 18px;
    --radius-sm: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html { height:100%; background:var(--bg); -webkit-text-size-adjust:100%; }
  body { min-height:100%; background:var(--bg); font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color:var(--text); overflow:hidden; overscroll-behavior:none; }
  button { font:inherit; -webkit-appearance:none; appearance:none; touch-action:manipulation; }
  #app { width:100%; max-width:520px; height:100vh; height:100svh; height:100dvh; margin:0 auto; display:flex; flex-direction:column; background:var(--bg); padding-top:var(--safe-top); }
  .header { padding:14px 20px 10px; flex-shrink:0; }
  .header-row { display:flex; align-items:flex-end; justify-content:space-between; gap:10px; }
  h1 { font-family:Georgia, "Times New Roman", serif; font-size:29px; font-weight:400; letter-spacing:-0.5px; line-height:1; }
  .subtitle { font-size:12px; color:var(--text3); margin-top:5px; }
  .tiny-btn { border:1px solid var(--border); background:var(--surface); color:var(--text2); border-radius:999px; padding:7px 10px; font-size:12px; }
  .nav { display:flex; gap:7px; padding:0 20px 11px; flex-shrink:0; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .nav::-webkit-scrollbar { display:none; }
  .nav-btn { padding:8px 14px; border-radius:999px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:13px; white-space:nowrap; flex-shrink:0; }
  .nav-btn.active { background:var(--text); color:var(--bg); border-color:var(--text); }
  .mode-row { display:flex; gap:7px; padding:0 20px 13px; flex-shrink:0; }
  .mode-pill { flex:1; min-width:0; padding:10px 7px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:13px; font-weight:600; }
  .mode-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 20px calc(24px + var(--safe-bottom)); }
  .prog-row { display:flex; align-items:center; gap:10px; margin-bottom:13px; }
  .prog-track { flex:1; height:5px; background:var(--surface2); border-radius:5px; overflow:hidden; }
  .prog-fill { height:100%; width:0; background:var(--accent); border-radius:5px; transition:width .25s ease; }
  .prog-label { font-size:12px; color:var(--text3); min-width:46px; text-align:right; }
  .card-wrap { perspective:1200px; margin-bottom:14px; }
  .card { width:100%; min-height:245px; position:relative; transform-style:preserve-3d; transition:transform .42s cubic-bezier(.2,.8,.2,1); border-radius:var(--radius); box-shadow:var(--shadow); }
  .card.flipped { transform:rotateY(180deg); }
  .card-face { position:absolute; inset:0; min-height:245px; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 23px; text-align:center; border:1px solid var(--border); }
  .card-front { background:var(--surface); }
  .card-back { background:var(--accent); transform:rotateY(180deg); }
  .card-eyebrow { font-size:11px; letter-spacing:.09em; text-transform:uppercase; margin-bottom:13px; font-weight:700; }
  .card-front .card-eyebrow { color:var(--text3); }
  .card-back .card-eyebrow { color:rgba(255,255,255,.68); }
  .card-word { font-family:Georgia, "Times New Roman", serif; font-size:32px; color:var(--text); line-height:1.16; overflow-wrap:anywhere; }
  .card-back .card-word { color:#fff; font-size:28px; }
  .card-topic-badge { font-size:11px; color:var(--text3); background:var(--surface2); padding:5px 10px; border-radius:999px; margin-top:12px; }
  .card-back .card-topic-badge { background:rgba(255,255,255,.16); color:rgba(255,255,255,.85); }
  .card-example { font-size:14px; color:rgba(255,255,255,.82); margin-top:14px; font-style:italic; line-height:1.45; }
  .tap-hint { font-size:12px; color:var(--text3); margin-top:14px; }
  .fb-row, .arrow-row { display:flex; gap:9px; margin-bottom:10px; }
  .fb-btn, .arrow-btn, .next-btn, .restart-btn { width:100%; border-radius:var(--radius-sm); min-height:48px; padding:12px; font-size:15px; font-weight:700; border:1px solid var(--border); }
  .fb-btn:active, .arrow-btn:active, .next-btn:active, .restart-btn:active, .nav-btn:active, .mode-pill:active { transform:scale(.98); }
  .fb-good { background:var(--accent-light); color:var(--accent); border-color:#B5CEB9; }
  .fb-bad { background:var(--red-light); color:var(--red); border-color:#D9AEAE; }
  .arrow-btn, .restart-btn { background:var(--surface); color:var(--text); }
  .next-btn { background:var(--text); color:var(--bg); border-color:var(--text); margin-top:2px; }
  .quiz-question, .result-card, .rr-step, .template-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
  .quiz-question { padding:25px 20px; text-align:center; margin-bottom:14px; }
  .label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:9px; font-weight:800; }
  .q-text { font-family:Georgia, "Times New Roman", serif; font-size:25px; line-height:1.25; }
  .options { display:flex; flex-direction:column; gap:9px; margin-bottom:13px; }
  .opt-btn { width:100%; padding:15px 16px; min-height:52px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:15px; text-align:left; }
  .opt-btn.correct { background:var(--accent-light); color:var(--accent); border-color:#B5CEB9; }
  .opt-btn.wrong { background:var(--red-light); color:var(--red); border-color:#D9AEAE; }
  .opt-btn:disabled { opacity:1; }
  .result-card { padding:34px 20px; text-align:center; margin-bottom:14px; }
  .result-big { font-family:Georgia, "Times New Roman", serif; font-size:58px; line-height:1; }
  .result-sub { font-size:14px; color:var(--text2); margin-top:7px; }
  .result-bar { height:7px; background:var(--surface2); border-radius:7px; margin:17px 0; overflow:hidden; }
  .result-bar-fill { height:100%; background:var(--accent); border-radius:7px; }
  .section-title { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin:0 0 10px; font-weight:800; }
  .rr-section { margin-bottom:20px; }
  .rr-step { overflow:hidden; margin-bottom:10px; }
  .rr-step-header { display:flex; align-items:center; gap:12px; padding:15px 16px; }
  .rr-num { width:30px; height:30px; border-radius:50%; background:var(--text); color:var(--bg); font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rr-title { font-size:15px; font-weight:800; }
  .rr-arrow { margin-left:auto; color:var(--text3); transition:transform .2s; }
  .rr-step.open .rr-arrow { transform:rotate(180deg); }
  .rr-body { display:none; padding:0 16px 16px; }
  .rr-step.open .rr-body { display:block; }
  .rr-body p, .template-box p { font-size:14px; color:var(--text2); line-height:1.65; margin-bottom:8px; }
  .rr-body strong { color:var(--text); }
  .rr-example { background:var(--accent-light); border-left:3px solid var(--accent); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:10px 12px; margin-top:9px; font-size:13px; color:var(--accent); font-style:italic; line-height:1.5; }
  .rr-chips, .chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; }
  .chip { background:var(--surface2); color:var(--text2); font-size:12px; padding:6px 10px; border-radius:999px; }
  .template-box { padding:15px; }
  .small-note { font-size:12px; color:var(--text3); text-align:center; margin-top:12px; line-height:1.4; }
  @media (max-width: 360px) {
    .header { padding-left:16px; padding-right:16px; }
    .nav, .mode-row, .scroll { padding-left:16px; padding-right:16px; }
    h1 { font-size:26px; }
    .card-word { font-size:29px; }
    .card-back .card-word { font-size:25px; }
    .mode-pill { font-size:12px; padding-left:4px; padding-right:4px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-row">
      <div>
        <h1>Vokabel-Trainer</h1>
        <p class="subtitle" id="subtitle">35 Wörter · 4 Themen</p>
      </div>
      <button class="tiny-btn" id="resetAllBtn" type="button">Reset</button>
    </div>
  </div>
  <div class="nav" id="topicNav" aria-label="Themenauswahl"></div>
  <div class="mode-row" id="modeRow" aria-label="Lernmodus">
    <button class="mode-pill active" data-mode="cards" type="button">Karten</button>
    <button class="mode-pill" data-mode="quiz" type="button">Quiz</button>
    <button class="mode-pill" data-mode="rr" type="button">Reading</button>
  </div>
  <main class="scroll" id="content"></main>
</div>

<script>
(function () {
'use strict';

const VOCAB = [
  {w:"bias",d:"Voreingenommenheit",t:"AI & Interviews",e:"AI systems can show bias against certain groups."},
  {w:"accuracy",d:"Genauigkeit",t:"AI & Interviews",e:"We must question the accuracy of AI screening tools."},
  {w:"resume",d:"Lebenslauf",t:"AI & Interviews",e:"She tailored her resume for each application."},
  {w:"penalize",d:"benachteiligen / bestrafen",t:"AI & Interviews",e:"Algorithms may penalize non-traditional career paths."},
  {w:"audit",d:"überprüfen / Prüfung",t:"AI & Interviews",e:"Companies should audit their hiring software regularly."},
  {w:"opt out",d:"sich abmelden / nicht mitmachen",t:"AI & Interviews",e:"Candidates should be able to opt out of AI screening."},
  {w:"impediment",d:"Hindernis / Behinderung",t:"AI & Interviews",e:"Bias is a serious impediment to fair hiring."},
  {w:"planned obsolescence",d:"geplante Obsoleszenz",t:"Planned Obsolescence",e:"This strategy keeps consumers buying new products."},
  {w:"subpar",d:"unterdurchschnittlich / mangelhaft",t:"Planned Obsolescence",e:"The battery life became subpar after two years."},
  {w:"culprit",d:"Schuldige(r) / Übeltäter",t:"Planned Obsolescence",e:"Software updates are often the culprit for slow devices."},
  {w:"prowess",d:"Können / Meisterschaft",t:"Planned Obsolescence",e:"Companies boast about their engineering prowess."},
  {w:"throw in the towel",d:"das Handtuch werfen",t:"Planned Obsolescence",e:"Many consumers throw in the towel and buy a new phone."},
  {w:"gravy train",d:"einträgliches Geschäft / leichtes Geld",t:"Planned Obsolescence",e:"Manufacturers ride the planned obsolescence gravy train."},
  {w:"chug along",d:"langsam vor sich hin trudeln",t:"Planned Obsolescence",e:"The old laptop still chugs along despite being outdated."},
  {w:"tried-and-true",d:"bewährt / erprobt",t:"Planned Obsolescence",e:"She stuck with her tried-and-true flip phone."},
  {w:"upheaval",d:"Umbruch / Aufruhr",t:"Leading in a Crisis",e:"The pandemic caused massive social upheaval."},
  {w:"decisive",d:"entschlossen / entscheidend",t:"Leading in a Crisis",e:"A good leader must be decisive under pressure."},
  {w:"compassionate",d:"mitfühlend / einfühlsam",t:"Leading in a Crisis",e:"Compassionate leadership builds trust in difficult times."},
  {w:"dedicated",d:"engagiert / hingebungsvoll",t:"Leading in a Crisis",e:"The team was dedicated to finding a solution."},
  {w:"vulnerable",d:"verletzlich / angreifbar",t:"Leading in a Crisis",e:"Leaders who show they are vulnerable gain more trust."},
  {w:"ambitious",d:"ehrgeizig / ambitioniert",t:"Leading in a Crisis",e:"She set ambitious targets for the recovery plan."},
  {w:"humiliation",d:"Demütigung / Erniedrigung",t:"Leading in a Crisis",e:"Public failure can lead to deep humiliation."},
  {w:"devastation",d:"Verwüstung / großer Schmerz",t:"Leading in a Crisis",e:"The flood caused widespread devastation."},
  {w:"dissipation",d:"Zerstreuung / Auflösung",t:"Leading in a Crisis",e:"The dissipation of team morale was a major concern."},
  {w:"bolster",d:"stärken / stützen",t:"Leading in a Crisis",e:"The manager tried to bolster team confidence."},
  {w:"ramp up",d:"hochfahren / steigern",t:"Leading in a Crisis",e:"They had to ramp up production during the crisis."},
  {w:"humility",d:"Bescheidenheit / Demut",t:"Leading in a Crisis",e:"Humility is a sign of strength in a good leader."},
  {w:"dire",d:"schrecklich / äußerst ernst",t:"Leading in a Crisis",e:"The situation was dire and required immediate action."},
  {w:"unwavering",d:"unerschütterlich / standhaft",t:"Leading in a Crisis",e:"Her unwavering commitment inspired the whole team."},
  {w:"humble",d:"bescheiden / demütig",t:"Leading in a Crisis",e:"A humble leader listens before speaking."},
  {w:"drove",d:"trieb an (Vergangenheit: 'to drive')",t:"Cutting Sugar",e:"Fear drove many people to change their diet."},
  {w:"curb",d:"einschränken / zügeln",t:"Cutting Sugar",e:"Doctors advise patients to curb their sugar intake."},
  {w:"factor in",d:"einkalkulieren / berücksichtigen",t:"Cutting Sugar",e:"You need to factor in hidden sugars in processed food."},
  {w:"disparity",d:"Ungleichheit / Diskrepanz",t:"Cutting Sugar",e:"There is a disparity in sugar consumption across groups."},
  {w:"compliance",d:"Einhaltung / Befolgung",t:"Cutting Sugar",e:"Patient compliance with the new diet was low."}
];

const TOPICS = ["Alle", "AI & Interviews", "Planned Obsolescence", "Leading in a Crisis", "Cutting Sugar"];
const MODES = ["cards", "quiz", "rr"];
const state = {
  activeTopic: "Alle",
  mode: "cards",
  deck: [],
  cardIdx: 0,
  flipped: false,
  known: 0,
  quizOrder: [],
  quizIdx: 0,
  quizScore: 0,
  quizAnswered: false,
  quizDone: false,
  currentOptions: []
};

const $ = (id) => document.getElementById(id);
const content = $('content');

function escapeHtml(value) {
  return String(value).replace(/[&<>"]/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function shuffle(input) {
  const a = input.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function filtered() {
  return state.activeTopic === 'Alle' ? VOCAB : VOCAB.filter((v) => v.t === state.activeTopic);
}
function saveSettings() {
  try { localStorage.setItem('vocabTrainerSettings', JSON.stringify({topic: state.activeTopic, mode: state.mode})); } catch(e) {}
}
function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('vocabTrainerSettings') || '{}');
    if (TOPICS.includes(saved.topic)) state.activeTopic = saved.topic;
    if (MODES.includes(saved.mode)) state.mode = saved.mode;
  } catch(e) {}
}
function resetLearning() {
  const f = filtered();
  state.deck = shuffle(f);
  state.cardIdx = 0;
  state.flipped = false;
  state.known = 0;
  state.quizOrder = shuffle(f);
  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  state.quizDone = false;
  state.currentOptions = [];
}
function buildNav() {
  $('topicNav').innerHTML = TOPICS.map((t) => `<button class="nav-btn${t === state.activeTopic ? ' active' : ''}" type="button" data-topic="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join('');
}
function updateModeButtons() {
  document.querySelectorAll('.mode-pill').forEach((btn) => btn.classList.toggle('active', btn.dataset.mode === state.mode));
}
function render() {
  buildNav();
  updateModeButtons();
  const f = filtered();
  $('subtitle').textContent = `${f.length} Wörter · ${state.activeTopic === 'Alle' ? '4 Themen' : state.activeTopic}`;
  if (state.mode === 'cards') renderCards();
  else if (state.mode === 'quiz') renderQuiz();
  else renderReadingResponse();
}
function pct(part, total) {
  return total ? Math.round((part / total) * 100) : 0;
}
function renderCards() {
  if (!state.deck.length) resetLearning();
  if (state.cardIdx >= state.deck.length) {
    const p = pct(state.known, state.deck.length);
    content.innerHTML = `<section class="result-card"><div class="result-big">${state.known}/${state.deck.length}</div><div class="result-sub">Gewusst · ${p}%</div><div class="result-bar"><div class="result-bar-fill" style="width:${p}%"></div></div></section><button class="restart-btn" type="button" data-action="restart">↺ Neu mischen</button><p class="small-note">Tipp: Teile diese Datei auf dein iPhone und öffne sie in Safari. Danach kannst du sie über „Teilen“ → „Zum Home-Bildschirm“ wie eine App speichern.</p>`;
    return;
  }
  const v = state.deck[state.cardIdx];
  const p = pct(state.cardIdx, state.deck.length);
  content.innerHTML = `
    <div class="prog-row"><div class="prog-track"><div class="prog-fill" style="width:${p}%"></div></div><span class="prog-label">${state.cardIdx + 1}/${state.deck.length}</span></div>
    <div class="card-wrap" data-action="flip" role="button" aria-label="Karte umdrehen">
      <div class="card${state.flipped ? ' flipped' : ''}">
        <div class="card-face card-front"><div class="card-eyebrow">Englisch</div><div class="card-word">${escapeHtml(v.w)}</div><span class="card-topic-badge">${escapeHtml(v.t)}</span><div class="tap-hint">Tippen zum Aufdecken</div></div>
        <div class="card-face card-back"><div class="card-eyebrow">Deutsch</div><div class="card-word">${escapeHtml(v.d)}</div><div class="card-example">&quot;${escapeHtml(v.e)}&quot;</div><span class="card-topic-badge">${escapeHtml(v.t)}</span></div>
      </div>
    </div>
    ${state.flipped ? `<div class="fb-row"><button class="fb-btn fb-bad" type="button" data-action="mark-bad">✗ Nochmal</button><button class="fb-btn fb-good" type="button" data-action="mark-good">✓ Gewusst</button></div>` : ''}
    <div class="arrow-row"><button class="arrow-btn" type="button" data-action="prev">← Zurück</button><button class="arrow-btn" type="button" data-action="next">Weiter →</button></div>`;
}
function renderQuiz() {
  if (!state.quizOrder.length) resetLearning();
  if (state.quizDone || state.quizIdx >= state.quizOrder.length) {
    const p = pct(state.quizScore, state.quizOrder.length);
    content.innerHTML = `<section class="result-card"><div class="result-big">${state.quizScore}/${state.quizOrder.length}</div><div class="result-sub">${p}% richtig</div><div class="result-bar"><div class="result-bar-fill" style="width:${p}%"></div></div></section><button class="restart-btn" type="button" data-action="restart">↺ Quiz wiederholen</button>`;
    return;
  }
  const f = filtered();
  const v = state.quizOrder[state.quizIdx];
  if (!state.quizAnswered || !state.currentOptions.length) {
    const wrong = shuffle(f.filter((x) => x.w !== v.w)).slice(0, Math.min(3, f.length - 1));
    state.currentOptions = shuffle([v].concat(wrong));
  }
  const p = pct(state.quizIdx, state.quizOrder.length);
  content.innerHTML = `
    <div class="prog-row"><div class="prog-track"><div class="prog-fill" style="width:${p}%"></div></div><span class="prog-label">${state.quizIdx + 1}/${state.quizOrder.length}</span></div>
    <section class="quiz-question"><div class="label">Was bedeutet …</div><div class="q-text">${escapeHtml(v.d)}</div></section>
    <div class="options">
      ${state.currentOptions.map((o) => {
        let cls = 'opt-btn';
        if (state.quizAnswered && o.w === v.w) cls += ' correct';
        if (state.quizAnswered && o.w === state.chosenAnswer && o.w !== v.w) cls += ' wrong';
        return `<button class="${cls}" type="button" data-answer="${escapeHtml(o.w)}" ${state.quizAnswered ? 'disabled' : ''}>${escapeHtml(o.w)}</button>`;
      }).join('')}
    </div>
    ${state.quizAnswered ? `<button class="next-btn" type="button" data-action="next-question">Weiter →</button>` : ''}`;
}
function renderReadingResponse() {
  const steps = [
    {n:1,title:'Einleitung',body:'Nenne den <strong>Titel</strong>, den <strong>Autor</strong> und das <strong>Thema</strong> des Textes. Formuliere dann deine <strong>Hauptreaktion in einem Satz</strong>.',example:'In the article “The Sugar Problem”, the author argues that hidden sugar in processed food is a major health risk.'},
    {n:2,title:'Zusammenfassung',body:'Fasse den <strong>Kerninhalt in 2–3 Sätzen</strong> zusammen. Nicht alles wiederholen — nur das Wesentliche.',example:'The author claims that sugar consumption has risen dramatically, driven by the food industry.'},
    {n:3,title:'Analyse & Reaktion',body:'Zeige kritisches Denken: Stimme ich zu? Welche Argumente sind überzeugend? Was fehlt dem Text? Verbinde es mit eigenen Erfahrungen.',example:'I find the argument convincing because it shows how difficult compliance can be in everyday life.'},
    {n:4,title:'Schluss',body:'Ein einzelner Satz, der deine Position zusammenfasst. Kein neues Argument einführen.',example:'Overall, the article raises important concerns, but a more nuanced approach would make it stronger.'}
  ];
  content.innerHTML = `<section class="rr-section"><div class="section-title">Aufbau einer Reading Response</div>${steps.map((s) => `<article class="rr-step" id="rr${s.n}"><div class="rr-step-header" data-rr="${s.n}"><div class="rr-num">${s.n}</div><div class="rr-title">${escapeHtml(s.title)}</div><span class="rr-arrow">▼</span></div><div class="rr-body"><p>${s.body}</p><div class="rr-example">${escapeHtml(s.example)}</div></div></article>`).join('')}</section><section class="rr-section"><div class="section-title">Schnell-Tipps</div><div class="chips">${['150–250 Wörter','Eigene Meinung zeigen','Vokabeln aus dem Text nutzen','Nicht nur nacherzählen','Kurze klare Sätze'].map((t) => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div></section><section class="rr-section"><div class="section-title">Vorlage</div><div class="template-box"><p>In the article <em>[title]</em> by <em>[author]</em>, the author argues that <em>[main idea]</em>. While I find this partially convincing, <em>[your reaction]</em>.</p><p>The text mainly focuses on <em>[short summary]</em>.</p><p>I agree with <em>[argument]</em> because <em>[reason]</em>. However, <em>[counterargument / missing point]</em>.</p><p>Overall, <em>[final evaluation]</em>.</p></div></section>`;
}
function setTopic(topic) {
  if (!TOPICS.includes(topic)) return;
  state.activeTopic = topic;
  resetLearning();
  saveSettings();
  render();
}
function setMode(mode) {
  if (!MODES.includes(mode)) return;
  state.mode = mode;
  resetLearning();
  saveSettings();
  render();
}
function markCard(good) {
  if (good) state.known += 1;
  state.cardIdx += 1;
  state.flipped = false;
  renderCards();
}
function checkAnswer(answer) {
  if (state.quizAnswered) return;
  const correct = state.quizOrder[state.quizIdx].w;
  state.chosenAnswer = answer;
  state.quizAnswered = true;
  if (answer === correct) state.quizScore += 1;
  renderQuiz();
}
function nextQuestion() {
  state.quizIdx += 1;
  state.quizAnswered = false;
  state.chosenAnswer = '';
  state.currentOptions = [];
  if (state.quizIdx >= state.quizOrder.length) state.quizDone = true;
  renderQuiz();
}

document.addEventListener('click', function (event) {
  const topicButton = event.target.closest('[data-topic]');
  if (topicButton) { setTopic(topicButton.dataset.topic); return; }
  const modeButton = event.target.closest('[data-mode]');
  if (modeButton) { setMode(modeButton.dataset.mode); return; }
  const answerButton = event.target.closest('[data-answer]');
  if (answerButton) { checkAnswer(answerButton.dataset.answer); return; }
  const rrHeader = event.target.closest('[data-rr]');
  if (rrHeader) { const el = $('rr' + rrHeader.dataset.rr); if (el) el.classList.toggle('open'); return; }
  const actionEl = event.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  if (action === 'flip') { state.flipped = !state.flipped; renderCards(); }
  if (action === 'mark-good') markCard(true);
  if (action === 'mark-bad') markCard(false);
  if (action === 'prev') { state.cardIdx = Math.max(0, state.cardIdx - 1); state.flipped = false; renderCards(); }
  if (action === 'next') { state.cardIdx = Math.min(state.deck.length - 1, state.cardIdx + 1); state.flipped = false; renderCards(); }
  if (action === 'restart') { resetLearning(); render(); }
  if (action === 'next-question') nextQuestion();
});

$('resetAllBtn').addEventListener('click', function () {
  state.activeTopic = 'Alle';
  state.mode = 'cards';
  resetLearning();
  saveSettings();
  render();
});

document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
loadSettings();
resetLearning();
render();
})();
</script>
</body>
</html>
